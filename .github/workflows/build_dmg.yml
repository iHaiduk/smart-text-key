name: Build & Package DMG

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run DMG Packager Script
      run: |
        ./scripts/package_dmg.sh > build_output.log 2>&1 || {
          echo "### ❌ Build Failure Details" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build_output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        }

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartTextKey-Installer-DMG
        path: SmartTextKey.dmg
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: SmartTextKey.dmg
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
