name: Build & Package DMG

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Select Xcode 16
      run: sudo xcode-select -s /Applications/Xcode_16.app

    - name: Install SwiftLint
      run: brew install swiftlint
    - name: Run SwiftLint
      run: swiftlint

    - name: Run Tests
      run: swift test

    - name: Run DMG Packager Script
      env:
        CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        NOTARY_PROFILE: ${{ secrets.NOTARY_PROFILE }}
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          export APP_VERSION="${GITHUB_REF_NAME#v}"
        fi
        export APP_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
        ./scripts/package_dmg.sh > build_output.log 2>&1 || {
          while IFS= read -r line; do
            echo "::error::$line"
          done < build_output.log
          exit 1
        }

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartTextKey-Installer-DMG
        path: SmartTextKey.dmg
        if-no-files-found: error

    # On tag push (v*) → create a proper versioned release with DMG attached
    - name: Create Versioned Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: SmartTextKey.dmg
        name: Smart Text Key ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # On main branch push → update rolling "latest" pre-release with DMG attached
    - name: Update Latest Pre-Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "🔮 Latest Build (main)"
        body: |
          This is an automatically updated pre-release from the latest commit on `main`.

          > ⚠️ This is a development build and may be unstable. For stable releases, check the [Releases page](https://github.com/${{ github.repository }}/releases).

          **Commit:** `${{ github.sha }}`
          **Built at:** ${{ github.event.head_commit.timestamp }}
        files: SmartTextKey.dmg
        draft: false
        prerelease: true
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
